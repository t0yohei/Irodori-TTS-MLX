name: v0.1 release gate

on:
  workflow_dispatch:
    inputs:
      include-optional-voicedesign:
        description: "Also run the heavier VoiceDesign caption-conditioned generation gate"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "41 4 1 * *"

permissions:
  contents: read

jobs:
  v0-1-release-gate:
    runs-on: macos-14
    timeout-minutes: 240
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: arm64

      - name: Install repo runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[runtime]"
          python -m pip install safetensors huggingface_hub

      - name: Check out upstream Irodori-TTS
        run: |
          git clone --depth=1 https://github.com/Aratako/Irodori-TTS.git "$RUNNER_TEMP/Irodori-TTS"
          python -m pip install -e "$RUNNER_TEMP/Irodori-TTS"

      - name: Run v0.1 release gate
        env:
          INCLUDE_OPTIONAL_VOICEDESIGN: ${{ github.event.inputs.include-optional-voicedesign || 'false' }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          extra_args=()
          if [ "$INCLUDE_OPTIONAL_VOICEDESIGN" = "true" ]; then
            extra_args+=(--include-optional-voicedesign)
          fi
          python scripts/run_v0_1_release_gate.py \
            --output-dir artifacts \
            --upstream-root "$RUNNER_TEMP/Irodori-TTS" \
            --json \
            "${extra_args[@]}" > artifacts/v0.1-release-gate-summary.json
          cat artifacts/v0.1-release-gate-summary.json

      - name: Upload release gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v0.1-release-gate
          path: artifacts/
          retention-days: 14
