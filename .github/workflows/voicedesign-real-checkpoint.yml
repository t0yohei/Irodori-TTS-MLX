name: VoiceDesign real-checkpoint integration

on:
  workflow_dispatch:
    inputs:
      full_conversion:
        description: "Also load tensor payloads and verify full .npz export"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 3 * * 1"

jobs:
  voicedesign-real-checkpoint:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install integration dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy safetensors huggingface_hub

      - name: Run real-checkpoint integration check
        env:
          FULL_CONVERSION: ${{ inputs.full_conversion == true && '1' || '0' }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          args=(--json)
          if [ "$FULL_CONVERSION" = "1" ]; then
            args+=(--full-conversion)
          fi
          python scripts/run_voicedesign_integration.py "${args[@]}" > artifacts/voicedesign-real-checkpoint.json
          cat artifacts/voicedesign-real-checkpoint.json

      - name: Upload integration report
        uses: actions/upload-artifact@v4
        with:
          name: voicedesign-real-checkpoint-report
          path: artifacts/voicedesign-real-checkpoint.json
