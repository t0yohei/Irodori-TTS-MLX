name: Packaging Python matrix

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  packaging-smoke:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate packaging metadata and editable install resolution
        run: |
          python -m pip install --upgrade pip
          python -m unittest tests.test_packaging_metadata -v
          python -m pip install --dry-run -e ".[dev]"
